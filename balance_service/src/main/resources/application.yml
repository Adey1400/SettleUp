server:
  port: 8084

spring:
  application:
    name: balance_service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/settleup_balance_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

application:
  security:
    jwt:
      secret: ${JWT_SECRET}