server:
  port: 8080

spring:
  application:
    name: api-gateway

  security:
    jwt:
      secret: ${SECRET_KEY}

  cloud:
    gateway:
      routes:
        - id: user-auth-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - AuthenticationFilter
